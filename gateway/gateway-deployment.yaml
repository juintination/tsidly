apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment

spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway-app

  template:
    metadata:
      labels:
        app: gateway-app

    spec:
      containers:
        - name: gateway-container
          image: tsidly-gateway
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: gateway-config
