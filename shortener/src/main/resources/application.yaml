server:
  port: 8081

spring:
  application:
    name: url-shortener-service

  config:
    import: optional:file:.env.${spring.profiles.active}[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${TSIDLY_DB_NAME}?serverTimezone=${SERVER_TIME_ZONE}&characterEncoding=${CHARACTER_ENCODING}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
