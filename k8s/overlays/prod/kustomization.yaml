apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/gateway
  - ../../base/shortener
  - ../../base/redirect
  - ../../infra/mysql
  - ../../infra/valkey
  - ../../infra/ingress
  - ../../secrets/prod/mysql
  - ../../secrets/prod/shortener

images:
  - name: tsidly/gateway
    newTag: v1.0.0

  - name: tsidly/shortener
    newTag: v1.0.0

  - name: tsidly/redirect
    newTag: v1.0.0

patches:
  - path: patch-replicas.yaml
