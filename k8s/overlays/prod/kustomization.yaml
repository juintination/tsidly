apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tsidly-prod
resources:
  - namespace.yaml
  - ../../base/gateway
  - ../../base/shortener
  - ../../base/redirect
  - ../../infra/mysql
  - ../../infra/valkey
  - ../../infra/ingress
  - ../../secrets/prod/mysql
  - ../../secrets/prod/shortener
images:
  - name: kwondeokjae/tsidly-gateway
    newTag: prod-1
  - name: kwondeokjae/tsidly-shortener
    newTag: prod-1
  - name: kwondeokjae/tsidly-redirect
    newTag: prod-1
patches:
  - path: patch-replicas.yaml
  - path: patch-ingress.yaml
