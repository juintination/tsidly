apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tsidly-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/juintination/tsidly.git
    targetRevision: dev
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: tsidly-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
