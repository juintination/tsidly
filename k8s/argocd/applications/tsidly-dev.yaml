apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tsidly-dev
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: gateway=kwondeokjae/tsidly-gateway,shortener=kwondeokjae/tsidly-shortener,redirect=kwondeokjae/tsidly-redirect

    argocd-image-updater.argoproj.io/gateway.update-strategy: name
    argocd-image-updater.argoproj.io/gateway.allow-tags: regexp:^dev-[0-9]+$
    argocd-image-updater.argoproj.io/shortener.update-strategy: name
    argocd-image-updater.argoproj.io/shortener.allow-tags: regexp:^dev-[0-9]+$
    argocd-image-updater.argoproj.io/redirect.update-strategy: name
    argocd-image-updater.argoproj.io/redirect.allow-tags: regexp:^dev-[0-9]+$

    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: dev

spec:
  project: default

  source:
    repoURL: https://github.com/juintination/tsidly.git
    targetRevision: dev
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: tsidly-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
