version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins

    ports:
      - "${JENKINS_HTTP_PORT}:8080"
      - "${JENKINS_AGENT_PORT}:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - TZ=${TIME_ZONE}

volumes:
  jenkins_home:
    name: tsidly_jenkins_home
