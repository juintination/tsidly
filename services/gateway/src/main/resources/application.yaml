server:
  port: 8080

spring:
  application:
    name: tsidly-gateway-service

  config:
    import: optional:file:.env.${spring.profiles.active}[.properties]

  cloud:
    gateway:
      server:
        web-flux:
          routes:
            - id: shortener-service
              uri: ${SHORTENER_SERVICE_URL}
              predicates:
                - Path=/api/shorten/**

            - id: redirect-service
              uri: ${REDIRECT_SERVICE_URL}
              predicates:
                - Path=/api/redirect/**
